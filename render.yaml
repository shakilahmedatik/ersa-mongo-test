services:
  - type: web
    name: ersa-chat-backend
    runtime: docker
    plan: free
    dockerfilePath: ./apps/backend/Dockerfile
    dockerContext: .
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: ersa-chat
      - key: BETTER_AUTH_SECRET
        sync: false
      - key: BETTER_AUTH_URL
        sync: false
      - key: BETTER_AUTH_CROSS_SITE_COOKIES
        value: "true"
      - key: CORS_ORIGINS
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: GOOGLE_GENERATIVE_AI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: MASTRA_ASSISTANT_MODEL
        value: openrouter/anthropic/claude-haiku-4-5
      - key: KNOWLEDGE_EMBEDDING_MODEL
        value: google/gemini-embedding-001
      - key: KNOWLEDGE_EMBEDDING_DIMENSIONS
        value: "3072"
      - key: KNOWLEDGE_VECTOR_INDEX_NAME
        value: knowledge_base_embeddings
      - key: CHAT_RATE_LIMIT_WINDOW_SECONDS
        value: "3600"
      - key: CHAT_RATE_LIMIT_MAX_REQUESTS
        value: "30"
      - key: CHAT_MEMORY_LAST_MESSAGES
        value: "24"
      - key: CHAT_COMPLETION_MAX_TOKENS
        value: "2048"
      - key: KNOWLEDGE_INGESTION_STALE_AFTER_MS
        value: "1800000"
      - key: KNOWLEDGE_INGESTION_PROGRESS_FLUSH_EVERY_DOCS
        value: "5"
      - key: LOG_LEVEL
        value: info

  - type: web
    name: ersa-chat-frontend
    runtime: docker
    plan: free
    dockerfilePath: ./apps/frontend/Dockerfile
    dockerContext: .
    healthCheckPath: /
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        sync: false
